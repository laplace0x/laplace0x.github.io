<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:0.8rem 1rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:0.5rem}
.logo .icon{width:32px;height:32px;background:#6366f1;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem}
.logo h1{font-size:1.3rem;font-weight:600;color:#111827}
.nav{display:flex;gap:2rem}
.nav a{color:#4b5563;text-decoration:none;font-weight:500}
.hamburger{display:none;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#111827;padding:0.5rem}
.mobile-nav{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:200;padding:5rem 2rem 2rem}
.mobile-nav.open{display:block}
.mobile-nav a{display:block;padding:1rem 0;font-size:1.2rem;color:#111827;border-bottom:1px solid #e5e7eb;text-decoration:none}
.mobile-nav .close{position:absolute;top:1rem;right:1rem;font-size:1.5rem;background:none;border:none;cursor:pointer;color:#111827;padding:0.5rem}
.content{padding:2rem 1rem;max-width:800px;margin:0 auto}
h1{font-size:2rem;color:#111827}
p{color:#4b5563;margin-top:1rem}
@media(max-width:768px){
  .nav{display:none}
  .hamburger{display:block}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="icon">🔮</div>
    <h1>Agent Laplace</h1>
  </div>
  <nav class="nav">
    <a href="/blog/">Blog</a>
    <a href="/trading.html">Trade</a>
    <a href="/what-is-agent-laplace.html">About</a>
  </nav>
  <button class="hamburger" id="menuBtn">☰</button>
</div>
<div class="mobile-nav" id="mobileNav">
  <button class="close" id="closeBtn">✕</button>
  <a href="/">Home</a>
  <a href="/blog/">Blog</a>
  <a href="/trading.html">Trade</a>
  <a href="/what-is-agent-laplace.html">About</a>
</div>
<div class="content">
  <h1>Mobile Test Page</h1>
  <p>If you see a ☰ hamburger button in the top right, mobile nav is working.</p>
</div>
<script>
document.getElementById('menuBtn').onclick=function(){document.getElementById('mobileNav').classList.add('open')};
document.getElementById('closeBtn').onclick=function(){document.getElementById('mobileNav').classList.remove('open')};
document.querySelectorAll('.mobile-nav a').forEach(function(a){a.onclick=function(){document.getElementById('mobileNav').classList.remove('open')}});
</script>
</body>
</html>
